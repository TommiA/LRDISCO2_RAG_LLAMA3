<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LR Disco RAG Query UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Land Rover Discovery 2 - repair and maintenance RAG Query</h1>
        <p>Ask the Land Rover Discovery II knowledge base a question.</p>
      </header>

      <main>
        <label for="prompt">Question</label>
        <textarea id="prompt" rows="4" placeholder="Enter your question here..."></textarea>

        <div class="controls">
          <label><input type="checkbox" id="debug" /> Show debug context</label>
          <button id="submit">Ask</button>
          <span id="status" class="status">Ready</span>
        </div>

        <section class="response-card">
          <h2>Answer</h2>
          <pre id="answer">Awaiting query...</pre>
        </section>

        <section class="response-card">
          <h2>Retrieved Context</h2>
          <pre id="context">Context will appear here once available.</pre>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
